server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    location = /labHero_efects.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    location = /labHero_styles.css {
        try_files $uri =404;
        default_type text/css;
        add_header Cache-Control "no-store" always;
    }


    # API VideoOtimization: proxy dedicado al backend FFmpeg.
    location = /api/optimize {
        proxy_pass http://labhero-video-optimizer:8000/api/optimize;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500m;
        proxy_read_timeout 900s;
        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
    }

    # API interna para persistir logos en /media desde el navegador.
    location /api/ {
        proxy_pass http://labhero-uploader:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # Necesario para scanServerMediaFolder()/scanMediaFolder().
    # También sirve /media/logo.json y el logo persistido por el uploader.
    location /media/ {
        alias /usr/share/nginx/html/media/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-store" always;
        types {
            application/json json;
            image/svg+xml svg;
            image/png png;
            image/jpeg jpg jpeg;
            image/webp webp;
            image/gif gif;
            video/mp4  mp4 m4v;
            video/webm webm;
            video/ogg ogv;
            video/quicktime mov;
        }
        try_files $uri $uri/ =404;
    }



    # Alias compatible por si el usuario coloca/referencia vídeos como /7media/.
    location /7media/ {
        alias /usr/share/nginx/html/media/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-store" always;
        types {
            application/json json;
            image/svg+xml svg;
            image/png png;
            image/jpeg jpg jpeg;
            image/webp webp;
            image/gif gif;
            video/mp4  mp4 m4v;
            video/webm webm;
            video/ogg ogv;
            video/quicktime mov;
        }
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

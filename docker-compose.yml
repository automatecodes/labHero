services:
  labhero-web:
    image: nginx:1.27-alpine
    container_name: ${NGINX_CONTAINER_NAME:-labhero-web}
    restart: unless-stopped
    ports:
      - "${LABHERO_HTTP_PORT:-8081}:80"
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      labhero-uploader:
        condition: service_healthy
      labhero-video-optimizer:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - labhero-net

  labhero-uploader:
    build:
      context: ./uploader
    container_name: ${UPLOADER_CONTAINER_NAME:-labhero-uploader}
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - MEDIA_DIR=/app/media
      - HTML_DIR=/app/html
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
    volumes:
      - ./html/media:/app/media:rw
      - ./html:/app/html:ro
      - ./html/assets/css:/app/html/assets/css:rw
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - labhero-net

  labhero-video-optimizer:
    build:
      context: ./video-optimizer-backend
    container_name: ${VIDEO_OPTIMIZER_CONTAINER_NAME:-labhero-video-optimizer}
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - PYTHONUNBUFFERED=1
    volumes:
      - video_optimizer_tmp:/tmp/video_processing
    networks:
      - labhero-net

volumes:
  video_optimizer_tmp:

networks:
  labhero-net:
    name: labhero-net
    driver: bridge
